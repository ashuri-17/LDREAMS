name: Build LDREAMS APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: LDREAMS-debug-apk
          path: app/build/outputs/apk/debug/*.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Generate keystore for signing
        run: |
          keytool -genkey -v -keystore release.keystore \
            -alias ldreams -keyalg RSA -keysize 2048 \
            -validity 10000 -storepass ldreams123 \
            -keypass ldreams123 \
            -dname "CN=LDREAMS, OU=Development, O=LDREAMS, L=Unknown, ST=Unknown, C=US"

      - name: Create Release Tag
        run: echo "RELEASE_TAG=v1.0.0-$(date +'%Y%m%d-%H%M')" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "LDREAMS ${{ env.RELEASE_TAG }}"
          body: |
            ## LDREAMS - Lucid Dreaming Companion

            ### Features:
            - Dream Journal with rich entry tracking
            - Dream Analysis with pattern detection
            - Lucidity Tracker with progress metrics
            - Reality Check system with notifications
            - Morning & bedtime reminders
            - Gamification with XP and levels
            - Guided lucid dreaming techniques
            - Dark dream-like aesthetic UI
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true
